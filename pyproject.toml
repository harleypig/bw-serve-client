# ??? keyword-only
# ??? output-datetime-class
# ??? parent-scoped-naming
# ??? reuse-model
# ??? target-python-version
# ??? treat-dot-as-module
# ??? use-exact-imports
# ??? use-pendulum
use-schema-description = true
# ??? use-title-as-name

# Template Customization
# ??? aliases
