# ??? custom-formatters-kwargs
# ??? custom-template-dir
# ??? encoding
# ??? extra-template-data
# ??? use-double-quotes
wrap-string-literal = true

# OpenAPI options
#include-path-parameters = true
#openapi-scopes = true
#strict-nullable = true
#use-operation-id-as-name = true
