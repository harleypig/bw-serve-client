[project]
name = "bw-serve-client"
version = "0.1.1"
description = "Bitwarden CLI Vault Management API"
authors = [
    {name = "Alan Young", email = "harleypig@harleypig.com"}
]
license = "MIT"
readme = "README.md"
keywords = ["Vault Management API", "vaultwarden", "bitwarden"]
requires-python = ">=3.9"
dependencies = [
    "aenum>=3.1.11",
    "pydantic>=2.0.0,<3.0.0",
    "python-dateutil>=2.5.3",
    "requests>=2.25.0,<3.0.0",
    "urllib3>=1.25.3,<2.1.0",
]

[project.urls]
Repository = "https://github.com/harleypig/bw-serve-client"

[project.optional-dependencies]
dev = [
    "bandit>=1.7.5,<2.0.0",
    "flake8>=4.0.0",
    "isort>=5.12.0,<6.0.0",
    "mypy>=1.9.0,<2.0.0",
    "pbr>=5.11.0,<6.0.0",
    "pydocstyle>=6.3.0,<7.0.0",
    "pytest>=7.2.1",
    "pytest-cov>=2.8.1",
    "pytest-mock>=3.12.0,<4.0.0",
    "pytest-randomly>=3.12.0",
    "setuptools>=65.0.0",
    "tox>=3.9.0",
    "yapf>=0.40.2,<1.0.0",
    "lxml>=5.1.0,<6.0.0",
]
docs = [
    "mkdocs>=1.5.3,<2.0.0",
    "sphinx>=7.2.6,<8.0.0",
    "sphinx-rtd-theme>=3.0.0,<4.0.0",
    "sphinx-autodoc-typehints>=2.0.0,<3.0.0",
    "sphinxcontrib-email>=0.3.6,<1.0.0",
    "sphinxcontrib-openapi>=0.8.4,<1.0.0",
    "sphinx-lint>=0.9.1,<1.0.0",
]

[dependency-groups]
dev = [
    "types-requests (>=2.32.4.20250913,<3.0.0.0)",
    "setuptools-scm (>=9.2.1,<10.0.0)",
    "bump2version (>=1.0.1,<2.0.0)",
    "pyright (>=1.1.406,<2.0.0)",
    "datamodel-code-generator (>=0.35.0,<0.36.0)"
]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [{include = "bw_serve_client"}]
exclude = ["scripts/**"]

[tool.mypy]
html_report = ".openapi/mypy-reports"
#files = ["bw_serve_client"]
#package = "bw_serve_client"
ignore_missing_imports = true
#follow_imports = "skip"
#namespace_packages = true
#explicit_package_bases = true
check_untyped_defs = false

[tool.pylint.'MESSAGES CONTROL']
extension-pkg-whitelist = "pydantic"

[tool.isort]
profile = "google"
line_length = 92
indent = "  "


[tool.yapf]
# Use PEP8 style as the base
based_on_style = "pep8"

# Basic formatting
indent_width = 2
column_limit = 92
continuation_indent_width = 2

# Whitespace and docstring settings
allow_multiline_dictionary_keys = true
allow_multiline_lambdas = true
blank_line_before_class_docstring = false
blank_line_before_module_docstring = true
indent_dictionary_value = true
spaces_before_comment = [5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55, 60, 65, 70, 75, 80]

# Bracket handling
coalesce_brackets = true
dedent_closing_brackets = true
align_closing_bracket_with_visual_indent = false
split_before_closing_bracket = true

# Line splitting behavior
split_before_arithmetic_operator = true
split_before_dict_set_generator = true
split_before_first_argument = true
split_before_named_assigns = true
split_before_expression_after_opening_paren = false
split_penalty_after_opening_bracket = 0
split_penalty_after_unary_operator = 10000
split_penalty_for_added_line_split = 30
split_penalty_excess_character = 7000

[tool.datamodel-codegen]
# ??? additional-imports
# XXX: custom-formatters to mimic pre-commit fix config
formatters = ["isort"]
input = "docs/vault-management-api.json"
input-file-type = "openapi"
output = "bw_serve_client/models"
output-model-type = "pydantic_v2.BaseModel"

# Typing customization
base-class = "pydantic.BaseModel"
# ??? disable-future-imports
# ??? enum-field-as-literal {all,one}
field-constraints = true
# ??? set-default-enum-member
# ??? strict-types {str,bytes,int,float,bool} [{str,bytes,int,float,bool} ...]
use-annotated = true
# ??? use-generic-container-types
# ??? use-non-positive-negative-number-constrained-types
# ??? use-one-literal-as-default
# ??? use-standard-collections
# ??? use-subclass-enum
# ??? use-union-operator
# ??? use-unique-items-as-set

# Field customization
#capitalise-enum-members = true
# ??? empty-enum-field-name
# ??? field-extra-keys
# ??? field-extra-keys-without-x-prefix
# ??? field-include-all-keys
# ??? force-optional
# ??? no-alias
# ??? original-field-name-delimiter
# ??? remove-special-field-name-prefix
# ??? set-default-enum-member
snake-case-field = true
# ??? special-field-name-prefix
strip-default-none = true
# ??? union-mode
# ??? use-default
# ??? use-default-kwarg
#use-field-description = true

# Model customization
# ??? allow-extra-fields
# ??? allow-population-by-field-name
# ??? class-name
# ??? collapse-root-models
# ??? disable-appending-item-suffix
# ??? disable-timestamp
# ??? enable-faux-immutability
# ??? enable-version-header
# ??? extra-fields
# ??? frozen-dataclasses
